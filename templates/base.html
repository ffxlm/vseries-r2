<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Manager | รวบรวมวิดีโอและรูปภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    },
                    colors: {
                        dark: '#111113',
                        darker: '#09090b',
                        card: '#18181b',
                        primary: '#14b8a6',
                        primaryHover: '#0d9488',
                        accent: '#f59e0b'
                    },
                    backdropBlur: {
                        xs: '2px',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background: #0b0b0d;
            color: #f4f4f5;
            min-height: 100vh;
        }
        .glass-panel {
            background: #18181b;
            border: 1px solid #27272a;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
        }
        .sidebar-link {
            border: 1px solid transparent;
            transition: background-color 0.16s ease, border-color 0.16s ease, color 0.16s ease;
        }
        .sidebar-link:hover {
            background: #202024;
            border-color: #303036;
            color: #f4f4f5;
        }
        .sidebar-link.active {
            background: #0f2f2c;
            border-color: #115e59;
            color: #5eead4;
        }
        .admin-shell {
            background-image:
                linear-gradient(#18181b 1px, transparent 1px),
                linear-gradient(90deg, #18181b 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: -1px -1px;
        }
        .admin-brand-mark {
            background: #0f2f2c;
            border: 1px solid #115e59;
            color: #5eead4;
        }
        .admin-section-label {
            color: #71717a;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #52525b; }
    </style>
</head>
<body class="admin-shell flex h-screen overflow-hidden font-sans">

    <!-- Mobile Header -->
    <div class="md:hidden fixed w-full top-0 left-0 h-14 glass-panel flex items-center justify-between px-4 z-50">
        <div class="flex items-center gap-3">
            <div class="admin-brand-mark w-9 h-9 rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-server text-sm"></i>
            </div>
            <div>
                <h1 class="text-base font-semibold text-zinc-100">Series Manager</h1>
                <p class="text-[10px] text-zinc-500 -mt-0.5">Admin Console</p>
            </div>
        </div>
        <button id="mobile-menu-btn" class="text-gray-300 hover:text-white focus:outline-none transition-colors">
            <i class="fa-solid fa-bars text-xl"></i>
        </button>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 transform -translate-x-full md:translate-x-0 w-64 bg-zinc-950 border-r border-zinc-800 z-40 transition-transform duration-300 flex flex-col pt-14 md:pt-0 shrink-0">
        <div class="hidden md:flex h-16 items-center px-4 border-b border-zinc-800">
            <div class="admin-brand-mark w-9 h-9 rounded-lg flex items-center justify-center mr-3">
                <i class="fa-solid fa-server text-sm"></i>
            </div>
            <div class="min-w-0">
                <h1 class="text-base font-semibold text-zinc-100 leading-tight">Series Manager</h1>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Admin Console</p>
            </div>
        </div>
        <nav class="flex-1 px-2 py-3 space-y-1 overflow-y-auto">
            <div class="admin-section-label mb-2 px-3 mt-1">เมนูหลัก</div>
            <a href="/" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/' %}active{% endif %}">
                <i class="fa-solid fa-chart-pie w-6 text-base"></i>
                <span class="font-medium">แดชบอร์ด</span>
            </a>
            <a href="/video" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/video' %}active{% endif %}">
                <i class="fa-solid fa-video w-6 text-base"></i>
                <span class="font-medium">จัดการวิดีโอ</span>
            </a>
            <a href="/image" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/image' %}active{% endif %}">
                <i class="fa-solid fa-image w-6 text-base"></i>
                <span class="font-medium">อัพโหลดปก</span>
            </a>
            <a href="/queue" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/queue' %}active{% endif %}">
                <i class="fa-solid fa-layer-group w-6 text-base"></i>
                <span class="font-medium">ติดตามคิวงาน</span>
            </a>
            <a href="/manage" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/manage' %}active{% endif %}">
                <i class="fa-solid fa-folder-tree w-6 text-base"></i>
                <span class="font-medium">คลังไฟล์</span>
            </a>
            
            <div class="admin-section-label mb-2 px-3 mt-6">ระบบ</div>
            <a href="/logs" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/logs' %}active{% endif %}">
                <i class="fa-solid fa-terminal w-6 text-base"></i>
                <span class="font-medium">แสดง Log</span>
            </a>
            <a href="/settings" class="sidebar-link flex items-center px-3 py-2.5 text-zinc-300 rounded-lg {% if request.path == '/settings' %}active{% endif %}">
                <i class="fa-solid fa-gear w-6 text-base"></i>
                <span class="font-medium">ตั้งค่า API</span>
            </a>
        </nav>
        
        <div class="p-3 border-t border-zinc-800">
            <div class="rounded-lg bg-zinc-900 border border-zinc-800 px-3 py-2">
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Runtime</p>
                <p class="text-xs text-zinc-300 mt-0.5">R2 Storage + FFmpeg</p>
            </div>
        </div>
    </aside>

    <!-- Overlay for mobile -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-30 hidden md:hidden transition-opacity"></div>

    <!-- Main Content -->
    <main class="flex-1 relative overflow-y-auto pt-16 md:pt-6 pb-10 px-4 md:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        const btn = document.getElementById('mobile-menu-btn');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        function toggleSidebar() {
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        btn.addEventListener('click', toggleSidebar);
        overlay.addEventListener('click', toggleSidebar);

        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            const bgClass = isError ? 'bg-red-600/90' : 'bg-emerald-600/90';
            const icon = isError ? 'fa-circle-exclamation' : 'fa-check-circle';
            
            toast.className = `fixed top-20 left-1/2 -translate-x-1/2 ${bgClass} backdrop-blur-md border border-white/10 text-white px-5 py-3 rounded-xl shadow-2xl transition-all duration-300 z-50 flex items-center gap-3 opacity-100`;
            toast.style.transform = 'translateX(-50%) translateY(0)';
            toast.innerHTML = `<i class="fa-solid ${icon} text-xl"></i><span class="font-medium">${message}</span>`;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-10px)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                showToast('คัดลอก URL สำเร็จแล้ว');
            } catch (err) {
                showToast('คัดลอกไม่สำเร็จ', true);
            }
        }
        
        async function fetchSeriesOptions() {
            try {
                const res = await fetch('/api/series');
                return await res.json();
            } catch (e) {
                return [];
            }
        }
    </script>
</body>
</html>
