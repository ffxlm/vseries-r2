{% extends 'base.html' %}

{% block content %}
<!-- DB Connection Status Alert -->
<div id="db-alert" class="hidden mb-6 bg-red-500/10 border border-red-500/30 text-red-400 px-5 py-4 rounded-xl flex items-center justify-between shadow-inner">
    <div class="flex items-center gap-3">
        <i class="fa-solid fa-database text-xl"></i>
        <div>
            <p class="font-bold text-sm">ระบบคิวงานไม่ทำงาน</p>
            <p class="text-xs opacity-80">กรุณาตั้งค่า MongoDB Connection URI ในหน้าตั้งค่า API ก่อนเริ่มงานวิดีโอ</p>
        </div>
    </div>
    <a href="/settings" class="bg-red-500 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-600 transition-all">ไปที่ตั้งค่า</a>
</div>

<div class="mb-8">
    <h2 class="text-3xl font-bold text-white mb-2 tracking-wide">จัดการวิดีโอ</h2>
    <p class="text-slate-400">สร้างโฟลเดอร์ซีรีส์และแปลงลิงก์ M3U8 เป็นไฟล์สำหรับสตรีมมิ่ง</p>
</div>

<div class="space-y-8">
    <!-- Section 1: Create Series Folder -->
    <div class="glass-panel p-6 md:p-8 rounded-2xl relative overflow-hidden group">
        <div class="absolute top-0 right-0 w-64 h-64 bg-blue-500/10 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none group-hover:bg-blue-500/20 transition-all"></div>
        
        <div class="flex items-center gap-3 mb-6 relative z-10">
            <div class="bg-blue-500/20 p-2.5 rounded-xl">
                <i class="fa-solid fa-folder-plus text-blue-400 text-xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-white">สร้างโฟลเดอร์ชื่อเรื่อง</h3>
        </div>
        
        <div class="flex flex-col md:flex-row gap-4 relative z-10">
            <div class="relative flex-1">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                    <i class="fa-solid fa-film text-slate-500"></i>
                </div>
                <input type="text" id="series-name" placeholder="ตั้งชื่อเรื่อง เช่น มังกรคลัง" class="w-full bg-slate-900/50 text-white border border-slate-700/50 rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-500">
            </div>
            <button onclick="createSeries()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-3.5 px-8 rounded-xl transition-all shadow-lg shadow-blue-600/30 flex items-center justify-center gap-2 whitespace-nowrap">
                <i class="fa-solid fa-plus"></i> สร้างโฟลเดอร์
            </button>
        </div>
    </div>

    <!-- Section 2: Convert URL to Episode -->
    <div class="glass-panel p-6 md:p-8 rounded-2xl relative overflow-hidden group">
        <div class="absolute top-0 right-0 w-64 h-64 bg-purple-500/10 rounded-full blur-3xl -mr-20 -mt-20 pointer-events-none group-hover:bg-purple-500/20 transition-all"></div>
        
        <div class="flex items-center gap-3 mb-6 relative z-10">
            <div class="bg-purple-500/20 p-2.5 rounded-xl">
                <i class="fa-solid fa-wand-magic-sparkles text-purple-400 text-xl"></i>
            </div>
            <h3 class="text-xl font-semibold text-white">แปลง URL เป็นโฟลเดอร์ตอน</h3>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 relative z-10">
            <!-- Search & Select Series -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">เลือกชื่อเรื่องซีรีส์ <span class="text-red-400">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-folder text-slate-500"></i>
                    </div>
                    <select id="series-select" class="w-full bg-slate-900/50 text-white border border-slate-700/50 rounded-xl pl-11 pr-10 py-3.5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 appearance-none transition-all">
                        <option value="">กำลังโหลด...</option>
                    </select>
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-chevron-down text-slate-500 text-xs"></i>
                    </div>
                </div>
            </div>
            
            <!-- EP Name -->
            <div>
                <label class="block text-sm font-medium text-slate-300 mb-2">ชื่อตอน <span class="text-red-400">*</span></label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i class="fa-solid fa-hashtag text-slate-500"></i>
                    </div>
                    <input type="text" id="ep-name" placeholder="เช่น EP1, EP2" class="w-full bg-slate-900/50 text-white border border-slate-700/50 rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder-slate-500">
                </div>
            </div>

            <!-- URL Input & JSON Upload -->
            <div class="md:col-span-2 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">URL M3U8 หรือเลือกไฟล์ JSON สำหรับ Bulk Upload</label>
                    <div class="flex gap-3">
                        <div class="relative flex-1">
                            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                <i class="fa-solid fa-link text-slate-500"></i>
                            </div>
                            <input type="text" id="m3u8-url" placeholder="https://example.com/video.m3u8" class="w-full bg-slate-900/50 text-white border border-slate-700/50 rounded-xl pl-11 pr-4 py-3.5 focus:outline-none focus:border-purple-500 focus:ring-1 focus:ring-purple-500 transition-all placeholder-slate-500 font-mono text-sm">
                        </div>
                        <input type="file" id="json-file" accept=".json" class="hidden" onchange="handleFile(event)">
                        <label for="json-file" class="bg-slate-700/50 hover:bg-slate-600/80 text-white px-5 py-3.5 rounded-xl transition-all border border-slate-600/50 flex items-center gap-2 cursor-pointer" title="อัปโหลดไฟล์ JSON">
                            <i class="fa-solid fa-file-code"></i> <span class="hidden sm:inline">เลือกไฟล์</span>
                        </label>
                        <button onclick="pasteUrl()" class="bg-slate-700/50 hover:bg-slate-600/80 text-white px-5 py-3.5 rounded-xl transition-all border border-slate-600/50 flex items-center gap-2" title="วางจากคลิปบอร์ด">
                            <i class="fa-solid fa-paste"></i> <span class="hidden sm:inline">วางลิ้งก์</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Action Button -->
            <div class="md:col-span-2 mt-2">
                <button onclick="startConversion()" id="convert-btn" class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-medium py-4 rounded-xl transition-all shadow-lg shadow-purple-500/25 flex items-center justify-center gap-2 text-lg">
                    <i class="fa-solid fa-bolt"></i> เริ่มสร้างและแปลงไฟล์
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    let bulkData = null;

    document.addEventListener('DOMContentLoaded', () => {
        loadSeries();
        checkDBStatus();
        setInterval(checkDBStatus, 5000);
    });

    function handleFile(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (Array.isArray(data)) {
                    bulkData = data;
                    showToast(`โหลดไฟล์สำเร็จ: ${data.length} รายการ`);
                    document.getElementById('m3u8-url').value = `[JSON Loaded: ${data.length} items]`;
                    document.getElementById('m3u8-url').disabled = true;
                    document.getElementById('ep-name').disabled = true;
                } else {
                    showToast('รูปแบบไฟล์ JSON ไม่ถูกต้อง (ต้องเป็น Array)', true);
                }
            } catch (err) {
                showToast('อ่านไฟล์ไม่สำเร็จ', true);
            }
        };
        reader.readAsText(file);
    }
    
    // ... (rest of the script)
    
    async function startConversion() {
        const series = document.getElementById('series-select').value;
        const btn = document.getElementById('convert-btn');
        
        if (!series) {
            showToast('กรุณาเลือกซีรีส์', true);
            return;
        }

        let payload;
        if (bulkData) {
            payload = bulkData.map(item => ({
                series_name: series,
                ep_name: item['ep-name'],
                url: item['m3u8-url']
            }));
        } else {
            const ep = document.getElementById('ep-name').value.trim();
            const url = document.getElementById('m3u8-url').value.trim();
            if (!ep || !url) {
                showToast('กรุณากรอกข้อมูลให้ครบถ้วน', true);
                return;
            }
            payload = { series_name: series, ep_name: ep, url: url };
        }

        const originalHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> กำลังส่ง...';
        btn.classList.add('opacity-70', 'cursor-not-allowed');
        
        try {
            const res = await fetch('/api/jobs/video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if (res.ok) {
                showToast('ส่งงานสำเร็จ');
                // Reset form
                bulkData = null;
                document.getElementById('json-file').value = '';
                document.getElementById('m3u8-url').value = '';
                document.getElementById('m3u8-url').disabled = false;
                document.getElementById('ep-name').disabled = false;
                document.getElementById('ep-name').value = '';
                
                setTimeout(() => {
                    window.location.href = '/queue';
                }, 700);
            } else {
                showToast(data.error || 'เกิดข้อผิดพลาด', true);
            }
        } catch (e) {
            showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', true);
        } finally {
            btn.disabled = false;
            btn.innerHTML = originalHtml;
            btn.classList.remove('opacity-70', 'cursor-not-allowed');
        }
    }

    async function checkDBStatus() {
        try {
            const res = await fetch('/api/db/status');
            const data = await res.json();
            const alertEl = document.getElementById('db-alert');
            const btn = document.getElementById('convert-btn');
            
            if (data.connected) {
                alertEl.classList.add('hidden');
                if (btn.innerHTML.includes('กรุณาตั้งค่า')) {
                    btn.disabled = false;
                    btn.classList.remove('opacity-70', 'cursor-not-allowed');
                    btn.innerHTML = '<i class="fa-solid fa-bolt"></i> เริ่มสร้างและแปลงไฟล์';
                }
            } else {
                alertEl.classList.remove('hidden');
                btn.disabled = true;
                btn.classList.add('opacity-70', 'cursor-not-allowed');
                btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> กรุณาตั้งค่า MongoDB';
            }
        } catch (e) {}
    }

    async function loadSeries() {
        const select = document.getElementById('series-select');
        try {
            const data = await fetchSeriesOptions();
            select.innerHTML = '<option value="">-- กรุณาเลือกซีรีส์ --</option>';
            data.forEach(folder => {
                select.innerHTML += `<option value="${escapeHtml(folder)}">${escapeHtml(folder)}</option>`;
            });
        } catch (e) {
            select.innerHTML = '<option value="">โหลดข้อมูลล้มเหลว</option>';
        }
    }

    async function createSeries() {
        const nameInput = document.getElementById('series-name');
        const name = nameInput.value.trim();
        
        if (!name) {
            showToast('กรุณากรอกชื่อเรื่อง', true);
            return;
        }
        
        try {
            const res = await fetch('/api/series', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({name: name})
            });
            
            if (res.ok) {
                showToast('สร้างโฟลเดอร์สำเร็จ');
                nameInput.value = '';
                loadSeries(); // reload select
            } else {
                showToast('เกิดข้อผิดพลาดในการสร้าง', true);
            }
        } catch (e) {
            showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', true);
        }
    }

    async function pasteUrl() {
        try {
            const text = await navigator.clipboard.readText();
            document.getElementById('m3u8-url').value = text;
        } catch (err) {
            showToast('เบราว์เซอร์ไม่อนุญาตให้อ่าน Clipboard', true);
        }
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }
</script>
{% endblock %}
