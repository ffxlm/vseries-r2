{% extends 'base.html' %}

{% block content %}
<div class="mb-6 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
        <h2 class="text-3xl font-bold text-white mb-2 tracking-wide">Job Monitor</h2>
        <p class="text-slate-400">ติดตามงานวิดีโอและรูปภาพจากคิวเดียว พร้อมสถานะ ความคืบหน้า log และผลลัพธ์</p>
    </div>
    <div class="flex items-center gap-2">
        <button onclick="refreshJobs(true)" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-white/5 px-4 py-2.5 rounded-xl text-sm transition-all flex items-center gap-2">
            <i class="fa-solid fa-rotate"></i>
            รีเฟรช
        </button>
    </div>
</div>

<div class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-5">
    <button data-filter="active" onclick="setFilter('active')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left border border-blue-500/40 bg-blue-500/10">
        <div class="text-[10px] uppercase font-bold text-blue-400">Active</div>
        <div id="count-active" class="text-2xl font-bold text-white">0</div>
    </button>
    <button data-filter="processing" onclick="setFilter('processing')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left">
        <div class="text-[10px] uppercase font-bold text-blue-400">Processing</div>
        <div id="count-processing" class="text-2xl font-bold text-white">0</div>
    </button>
    <button data-filter="queued" onclick="setFilter('queued')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left">
        <div class="text-[10px] uppercase font-bold text-slate-400">Queued</div>
        <div id="count-queued" class="text-2xl font-bold text-white">0</div>
    </button>
    <button data-filter="completed" onclick="setFilter('completed')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left">
        <div class="text-[10px] uppercase font-bold text-emerald-400">Completed</div>
        <div id="count-completed" class="text-2xl font-bold text-white">0</div>
    </button>
    <button data-filter="error" onclick="setFilter('error')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left">
        <div class="text-[10px] uppercase font-bold text-red-400">Error</div>
        <div id="count-error" class="text-2xl font-bold text-white">0</div>
    </button>
    <button data-filter="canceled" onclick="setFilter('canceled')" class="filter-btn glass-panel rounded-xl px-4 py-3 text-left">
        <div class="text-[10px] uppercase font-bold text-amber-500">Canceled</div>
        <div id="count-canceled" class="text-2xl font-bold text-white">0</div>
    </button>
</div>

<div class="glass-panel rounded-2xl p-3 mb-5 flex flex-wrap items-center gap-2">
    <button data-type="all" onclick="setTypeFilter('all')" class="type-btn px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-bold">ทั้งหมด</button>
    <button data-type="video" onclick="setTypeFilter('video')" class="type-btn px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs font-bold">
        <i class="fa-solid fa-video mr-1"></i> วิดีโอ
    </button>
    <button data-type="image" onclick="setTypeFilter('image')" class="type-btn px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs font-bold">
        <i class="fa-solid fa-image mr-1"></i> รูปภาพ
    </button>
    <div class="ml-auto text-xs text-slate-500">
        อัปเดตล่าสุด: <span id="last-updated">-</span>
    </div>
</div>

<div id="empty-state" class="hidden bg-slate-900/40 rounded-2xl border border-dashed border-slate-800 py-16 text-center">
    <div class="bg-slate-800/50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-600 border border-white/5">
        <i class="fa-solid fa-list-check text-3xl"></i>
    </div>
    <p class="text-slate-300 font-medium text-lg">ยังไม่มีงานในมุมมองนี้</p>
    <p class="text-slate-500 text-sm mt-1">สร้างงานใหม่จากเมนูวิดีโอหรือรูปภาพ แล้วกลับมาดูสถานะที่นี่</p>
</div>

<div id="job-list" class="space-y-3"></div>

<style>
    .filter-btn, .type-btn, .job-details summary {
        transition: all 0.2s ease;
    }
    .job-details summary::-webkit-details-marker {
        display: none;
    }
    .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }
</style>

<script>
    let jobs = [];
    let statusFilter = 'active';
    let typeFilter = 'all';
    let pollingPaused = false;
    let openDetails = new Set();

    document.addEventListener('DOMContentLoaded', () => {
        refreshJobs();
        setInterval(refreshJobs, 2000);
    });

    async function refreshJobs(force = false) {
        if (pollingPaused && !force) return;
        try {
            const res = await fetch('/api/jobs');
            jobs = await res.json();
            renderJobs();
            document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
        } catch (error) {
            console.error('Failed to load jobs', error);
        }
    }

    function setFilter(nextFilter) {
        statusFilter = nextFilter;
        document.querySelectorAll('.filter-btn').forEach(btn => {
            const active = btn.dataset.filter === nextFilter;
            btn.classList.toggle('border-blue-500/40', active);
            btn.classList.toggle('bg-blue-500/10', active);
        });
        renderJobs();
    }

    function setTypeFilter(nextFilter) {
        typeFilter = nextFilter;
        document.querySelectorAll('.type-btn').forEach(btn => {
            const active = btn.dataset.type === nextFilter;
            btn.className = active
                ? 'type-btn px-3 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-bold'
                : 'type-btn px-3 py-1.5 rounded-lg bg-slate-800 text-slate-300 hover:bg-slate-700 text-xs font-bold';
        });
        renderJobs();
    }

    function normalizeJobs(rawJobs) {
        return Array.isArray(rawJobs) ? rawJobs : Object.values(rawJobs || {});
    }

    function renderJobs() {
        const allJobs = normalizeJobs(jobs);
        updateCounts(allJobs);

        const visibleJobs = allJobs.filter(job => {
            const statusMatch = statusFilter === 'active'
                ? ['queued', 'processing', 'error'].includes(job.status)
                : statusFilter === 'all' || job.status === statusFilter;
            const typeMatch = typeFilter === 'all' || job.type === typeFilter;
            return statusMatch && typeMatch;
        });

        const list = document.getElementById('job-list');
        const empty = document.getElementById('empty-state');

        if (visibleJobs.length === 0) {
            list.innerHTML = '';
            empty.classList.remove('hidden');
            return;
        }

        empty.classList.add('hidden');
        list.innerHTML = visibleJobs.map(renderJobCard).join('');
    }

    function updateCounts(allJobs) {
        const counts = {
            active: 0,
            queued: 0,
            processing: 0,
            completed: 0,
            error: 0,
            canceled: 0
        };
        allJobs.forEach(job => {
            if (counts[job.status] !== undefined) counts[job.status] += 1;
            if (['queued', 'processing', 'error'].includes(job.status)) counts.active += 1;
        });
        Object.entries(counts).forEach(([key, value]) => {
            const el = document.getElementById(`count-${key}`);
            if (el) el.textContent = value;
        });
    }

    function renderJobCard(job) {
        const status = job.status || 'unknown';
        const stage = job.stage || status;
        const progress = job.progress || '0%';
        const resultUrl = job.result_url || (job.result && job.result.url) || '';
        const isActive = status === 'processing' || status === 'queued';
        const isProcessing = status === 'processing';
        const isError = status === 'error';
        const isDone = status === 'completed';
        const icon = job.type === 'image' ? 'fa-image' : 'fa-video';
        const accent = isError ? 'red' : isDone ? 'emerald' : isProcessing ? 'blue' : 'slate';
        const theme = accentTheme(accent);
        const createdAt = formatDate(job.created_at);
        const heartbeat = formatDate(job.heartbeat_at);
        const progressWidth = clampProgress(progress);

        return `
            <div class="glass-panel rounded-xl border ${theme.border} overflow-hidden" id="job-${job.task_id}">
                <div class="p-4">
                    <div class="flex flex-col gap-4 lg:flex-row lg:items-center">
                        <div class="flex items-start gap-3 min-w-0 flex-1">
                            <div class="w-10 h-10 rounded-lg bg-slate-900/70 border border-white/5 flex items-center justify-center ${theme.text} shrink-0">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <div class="min-w-0 flex-1 pt-0.5">
                                <div class="flex flex-wrap items-center gap-2">
                                    <h3 class="text-white font-semibold truncate max-w-full">${escapeHtml(job.name || job.task_id)}</h3>
                                    ${statusBadge(status)}
                                </div>
                                <div class="flex flex-wrap items-center gap-2 mt-1">
                                    <span class="text-[10px] px-2 py-0.5 rounded bg-slate-900 text-slate-400 uppercase font-bold">${escapeHtml(job.type || '-')}</span>
                                    <span class="text-xs text-slate-500">${createdAt}</span>
                                </div>
                                <p class="${isError ? 'text-red-400' : 'text-slate-400'} text-sm mt-2 line-clamp-2">${escapeHtml(job.message || '-')}</p>
                            </div>
                        </div>

                        <div class="lg:w-64">
                            <div class="flex justify-between text-xs mb-1.5">
                                <span class="text-slate-500 font-bold uppercase">${escapeHtml(stage)}</span>
                                <span class="${theme.text} font-bold">${escapeHtml(progress)}</span>
                            </div>
                            <div class="h-2 bg-slate-900 rounded-full overflow-hidden border border-white/5">
                                <div class="h-full ${theme.bar} transition-all duration-700" style="width: ${progressWidth}"></div>
                            </div>
                        </div>

                        <div class="flex flex-wrap gap-2 justify-end lg:w-auto">
                            ${resultUrl ? `
                                <button onclick="copyToClipboard('${escapeAttr(escapeJs(resultUrl))}')" class="bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg text-sm flex items-center gap-2">
                                    <i class="fa-solid fa-copy"></i> Copy
                                </button>
                            ` : ''}
                            ${isActive ? `
                                <button onclick="cancelJob('${escapeAttr(escapeJs(job.task_id))}')" class="bg-amber-500/10 hover:bg-amber-500/20 text-amber-400 border border-amber-500/20 px-3 py-2 rounded-lg text-sm flex items-center gap-2">
                                    <i class="fa-solid fa-ban"></i> Cancel
                                </button>
                            ` : ''}
                            <button onclick="deleteJob('${escapeAttr(escapeJs(job.task_id))}')" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-3 py-2 rounded-lg text-sm flex items-center gap-2">
                                <i class="fa-solid fa-trash-can"></i> Delete
                            </button>
                        </div>
                    </div>

                    <details class="job-details mt-3" ${openDetails.has(job.task_id) ? 'open' : ''} ontoggle="rememberDetails('${escapeAttr(escapeJs(job.task_id))}', this.open)">
                        <summary class="cursor-pointer text-xs text-slate-400 hover:text-slate-200 inline-flex items-center gap-2 px-2 py-1 rounded-lg hover:bg-slate-800">
                            <i class="fa-solid fa-chevron-down"></i> Details
                        </summary>
                        <div class="mt-3 grid grid-cols-1 lg:grid-cols-3 gap-3 text-xs">
                            <div class="bg-slate-900/50 rounded-lg px-3 py-2 border border-white/5">
                                <div class="text-slate-500 uppercase font-bold text-[10px]">Heartbeat</div>
                                <div class="text-slate-300">${heartbeat}</div>
                            </div>
                            <div class="bg-slate-900/50 rounded-lg px-3 py-2 border border-white/5">
                                <div class="text-slate-500 uppercase font-bold text-[10px]">Retries</div>
                                <div class="text-slate-300">${job.retry_count || 0}</div>
                            </div>
                            <div class="bg-slate-900/50 rounded-lg px-3 py-2 border border-white/5">
                                <div class="text-slate-500 uppercase font-bold text-[10px]">Task ID</div>
                                <div class="text-slate-300 truncate">${escapeHtml(job.task_id)}</div>
                            </div>
                        </div>
                        ${resultUrl ? `
                            <div class="mt-3">
                                <input readonly value="${escapeAttr(resultUrl)}" class="w-full bg-slate-950 border border-slate-800 rounded-lg px-3 py-2 text-xs text-slate-300 font-mono">
                            </div>
                        ` : ''}
                    </details>
                </div>
            </div>
        `;
    }

    function accentTheme(accent) {
        const themes = {
            red: { border: 'border-red-500/20', text: 'text-red-400', bar: 'bg-red-500' },
            emerald: { border: 'border-emerald-500/20', text: 'text-emerald-400', bar: 'bg-emerald-500' },
            blue: { border: 'border-blue-500/20', text: 'text-blue-400', bar: 'bg-blue-500' },
            slate: { border: 'border-slate-500/20', text: 'text-slate-400', bar: 'bg-slate-500' }
        };
        return themes[accent] || themes.slate;
    }

    function statusBadge(status) {
        const map = {
            queued: 'bg-slate-500/20 text-slate-300',
            processing: 'bg-blue-500/20 text-blue-400 animate-pulse',
            completed: 'bg-emerald-500/20 text-emerald-400',
            error: 'bg-red-500/20 text-red-400',
            canceled: 'bg-amber-500/20 text-amber-400'
        };
        return `<span class="text-[10px] px-2 py-0.5 rounded-full ${map[status] || 'bg-slate-500/20 text-slate-300'} font-bold uppercase">${escapeHtml(status)}</span>`;
    }

    async function cancelJob(taskId) {
        if (!confirm('ต้องการยกเลิกงานนี้ใช่ไหม?')) return;
        pollingPaused = true;
        try {
            const res = await fetch(`/api/jobs/${taskId}/cancel`, { method: 'POST' });
            if (res.ok) showToast('ส่งคำสั่งยกเลิกงานแล้ว');
            else showToast('ยกเลิกงานไม่สำเร็จ', true);
        } catch (error) {
            showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', true);
        } finally {
            pollingPaused = false;
            refreshJobs(true);
        }
    }

    async function deleteJob(taskId) {
        if (!confirm('ต้องการลบงานนี้ออกจากรายการใช่ไหม?')) return;
        const card = document.getElementById(`job-${taskId}`);
        if (card) card.classList.add('opacity-40');
        pollingPaused = true;
        try {
            const res = await fetch(`/api/jobs/${taskId}`, { method: 'DELETE' });
            if (res.ok) showToast('ลบงานออกจากรายการแล้ว');
            else {
                if (card) card.classList.remove('opacity-40');
                showToast('ลบงานไม่สำเร็จ', true);
            }
        } catch (error) {
            if (card) card.classList.remove('opacity-40');
            showToast('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', true);
        } finally {
            pollingPaused = false;
            refreshJobs(true);
        }
    }

    function formatDate(value) {
        if (!value) return '-';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return '-';
        return date.toLocaleString();
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
        return escapeHtml(value).replaceAll('`', '&#096;');
    }

    function escapeJs(value) {
        return String(value ?? '')
            .replaceAll('\\', '\\\\')
            .replaceAll("'", "\\'")
            .replaceAll('\n', '\\n')
            .replaceAll('\r', '\\r');
    }

    function clampProgress(progress) {
        const numeric = Number.parseFloat(String(progress).replace('%', ''));
        if (!Number.isFinite(numeric)) return '0%';
        return `${Math.min(Math.max(numeric, 0), 100)}%`;
    }

    function rememberDetails(taskId, isOpen) {
        if (isOpen) openDetails.add(taskId);
        else openDetails.delete(taskId);
    }
</script>
{% endblock %}
