{% extends 'base.html' %}

{% block content %}
<div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
        <h2 class="text-3xl font-bold text-white mb-2 tracking-wide">Live Monitor</h2>
        <p class="text-slate-400">ติดตามการทำงานปัจจุบันและตรวจสอบข้อผิดพลาด</p>
    </div>
</div>

<div class="space-y-8">
    <!-- Active Tasks Section -->
    <div>
        <div class="flex items-center gap-2 mb-4 px-1 text-blue-400">
            <i class="fa-solid fa-circle-notch fa-spin"></i>
            <h3 class="text-sm font-bold uppercase tracking-widest">กำลังดำเนินการ</h3>
        </div>
        
        <div id="active-tasks" class="space-y-4">
            <!-- Active tasks injected here -->
        </div>
        
        <div id="no-active-tasks" class="hidden glass-panel p-10 rounded-2xl border border-dashed border-slate-800 text-center">
            <p class="text-slate-500 text-sm">ไม่มีงานที่กำลังประมวลผลในขณะนี้</p>
        </div>
    </div>

    <!-- Failed Tasks Section -->
    <div>
        <div class="flex items-center gap-2 mb-4 px-1 text-red-400">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <h3 class="text-sm font-bold uppercase tracking-widest">งานที่ล้มเหลว</h3>
        </div>
        
        <div id="failed-tasks" class="grid grid-cols-1 gap-4">
            <!-- Failed tasks injected here -->
        </div>
        
        <div id="no-failed-tasks" class="hidden glass-panel p-8 rounded-2xl border border-dashed border-slate-800 text-center text-slate-500 text-sm">
            ไม่มีประวัติงานที่ผิดพลาด
        </div>
    </div>
</div>

<style>
    .log-window {
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
        scrollbar-width: thin;
        scrollbar-color: #334155 transparent;
        /* Removed smooth scroll to make line jumps more readable */
    }
    .log-window::-webkit-scrollbar { width: 4px; }
    .log-window::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
</style>

<script>
    let isPaused = false;

    document.addEventListener('DOMContentLoaded', () => {
        updateMonitor();
        setInterval(updateDBStatus, 10000); // Check DB status occasionally
        setInterval(updateMonitor, 1000); // Poll every 1 second
    });

    async function updateMonitor() {
        if (isPaused) return;
        try {
            const res = await fetch('/api/tasks');
            const tasks = await res.json();
            renderMonitor(tasks);
        } catch (e) {
            console.error('Monitor update failed', e);
        }
    }

    function renderMonitor(tasks) {
        const activeContainer = document.getElementById('active-tasks');
        const failedContainer = document.getElementById('failed-tasks');
        const noActive = document.getElementById('no-active-tasks');
        const noFailed = document.getElementById('no-failed-tasks');
        
        const taskArray = Array.isArray(tasks) ? tasks : Object.values(tasks);
        const activeList = taskArray.filter(t => t.status === 'processing');
        const failedList = taskArray.filter(t => t.status === 'error');

        // Handle Active Tasks
        if (activeList.length === 0) {
            activeContainer.innerHTML = '';
            noActive.classList.remove('hidden');
        } else {
            noActive.classList.add('hidden');
            
            // Surgically update or add task cards
            activeList.forEach(task => {
                let card = document.getElementById(`task-${task.task_id}`);
                let isFirstRender = false;

                if (!card) {
                    isFirstRender = true;
                    // Create new card if it doesn't exist
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = `
                        <div class="glass-panel p-6 rounded-2xl border-l-4 border-l-blue-500 overflow-hidden relative mb-4" id="task-${task.task_id}">
                            <div class="flex flex-col lg:flex-row gap-6">
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-3 mb-2">
                                        <h4 class="text-lg font-bold text-white truncate task-name">${task.name}</h4>
                                        <span class="text-[10px] px-2 py-0.5 rounded-full bg-blue-500/20 text-blue-400 font-bold animate-pulse status-badge">${task.status.toUpperCase()}</span>
                                    </div>
                                    <p class="text-sm text-slate-400 mb-4 status-message">${task.message}</p>
                                    
                                    <div class="space-y-2 mb-4">
                                        <div class="flex justify-between text-xs font-bold">
                                            <span class="text-slate-500 uppercase">Progress</span>
                                            <span class="text-blue-400 progress-text">${task.progress}</span>
                                        </div>
                                        <div class="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                            <div class="h-full bg-blue-500 transition-all duration-1000 linear progress-bar" style="width: ${task.progress}"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="lg:w-1/2 flex flex-col">
                                    <div class="text-[10px] font-bold text-slate-500 uppercase mb-2 flex items-center gap-2">
                                        <i class="fa-solid fa-terminal"></i> Live Output
                                    </div>
                                    <div class="log-window auto-scroll-log w-full bg-slate-950/80 rounded-xl p-4 text-[11px] text-slate-300 h-48 overflow-y-auto border border-white/5">
                                        <div class="log-content"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    activeContainer.appendChild(tempDiv.firstElementChild);
                    card = document.getElementById(`task-${task.task_id}`);
                }

                // Update Existing Card
                card.querySelector('.status-message').innerText = task.message;
                card.querySelector('.progress-text').innerText = task.progress;
                card.querySelector('.progress-bar').style.width = task.progress;
                
                const logWin = card.querySelector('.log-window');
                const logContent = card.querySelector('.log-content');
                
                // Sticky Scroll Logic
                // If first render, we definitely want to scroll to bottom.
                // If already rendered, only scroll if user was already at the bottom.
                const isAtBottom = isFirstRender || (Math.abs(logWin.scrollHeight - logWin.clientHeight - logWin.scrollTop) < 60);
                
                const newLogsHtml = task.logs && task.logs.length > 0 
                    ? task.logs.map(log => `<div class="mb-1 opacity-80 hover:opacity-100">${log}</div>`).join('') 
                    : '<span class="text-slate-600">Waiting for logs...</span>';
                
                if (logContent.innerHTML !== newLogsHtml) {
                    logContent.innerHTML = newLogsHtml;
                    if (isAtBottom) {
                        // Use a small timeout to ensure DOM has updated
                        setTimeout(() => {
                            logWin.scrollTop = logWin.scrollHeight;
                        }, 10);
                    }
                }
            });

            // Remove cards that are no longer active
            Array.from(activeContainer.children).forEach(card => {
                const taskId = card.id.replace('task-', '');
                if (!activeList.find(t => t.task_id === taskId)) {
                    card.remove();
                }
            });
        }

        // Render Failed
        if (failedList.length === 0) {
            failedContainer.innerHTML = '';
            noFailed.classList.remove('hidden');
        } else {
            noFailed.classList.add('hidden');
            failedContainer.innerHTML = failedList.map(task => `
                <div class="glass-panel p-5 rounded-xl border border-red-500/20 bg-red-500/5 flex items-center justify-between gap-4 mb-4" id="failed-${task.task_id}">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-red-500/10 flex items-center justify-center text-red-400">
                            <i class="fa-solid fa-circle-exclamation text-xl"></i>
                        </div>
                        <div>
                            <h4 class="font-bold text-white text-sm">${task.name}</h4>
                            <p class="text-xs text-red-400/80">${task.message}</p>
                        </div>
                    </div>
                    <button onclick="dismissTask('${task.task_id}')" class="bg-slate-800 hover:bg-red-500/20 text-slate-400 hover:text-red-400 p-2.5 rounded-lg transition-all border border-white/5">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `).join('');
        }
    }

    async function dismissTask(tid) {
        // Optimistic UI: Hide immediately
        const el = document.getElementById(`failed-${tid}`);
        if (el) el.classList.add('hidden');
        
        // Pause polling
        isPaused = true;
        
        try {
            const res = await fetch(`/api/task/${tid}/delete`, { method: 'POST' });
            if (res.ok) {
                showToast('ลบรายการที่ผิดพลาดแล้ว');
            } else {
                if (el) el.classList.remove('hidden');
            }
        } catch (e) {
            showToast('เกิดข้อผิดพลาดในการลบ', true);
            if (el) el.classList.remove('hidden');
        } finally {
            setTimeout(() => {
                isPaused = false;
                updateMonitor();
            }, 2000);
        }
    }

    async function updateDBStatus() {
        try { fetch('/api/db/status'); } catch(e) {}
    }
</script>
{% endblock %}
