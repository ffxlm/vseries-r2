{% extends 'base.html' %}

{% block content %}
<!-- Tom Select CSS -->
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>

<div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
    <div>
        <h2 class="text-3xl font-bold text-white mb-2 tracking-wide">คลังไฟล์ข้อมูล</h2>
        <p class="text-slate-400">ตรวจสอบ ลบ และคัดลอกลิงก์ไฟล์ที่เก็บไว้ใน R2 Cloudflare</p>
    </div>
    
    <button onclick="deleteSeries()" id="delete-series-btn" class="hidden bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/30 font-medium py-2.5 px-5 rounded-xl transition-all items-center whitespace-nowrap shadow-sm">
        <i class="fa-solid fa-trash-can mr-2"></i> ลบซีรีส์นี้ทั้งเรื่อง
    </button>
</div>

<div class="glass-panel p-6 md:p-8 rounded-2xl relative">
    
    <div class="mb-8 max-w-xl">
        <label class="block text-sm font-medium text-slate-300 mb-2">เลือกชื่อเรื่องซีรีส์ที่ต้องการจัดการ</label>
        
        <!-- Skeleton Placeholder: แสดงตอนโหลดครั้งแรก -->
        <div id="series-select-skeleton" class="ts-placeholder flex items-center justify-between">
            <span class="text-slate-500 text-sm">กำลังโหลดรายชื่อซีรีส์...</span>
            <i class="fa-solid fa-circle-notch fa-spin text-slate-600 text-sm"></i>
        </div>

        <!-- Real Select Wrapper: ซ่อนไว้ก่อนจนกว่าจะพร้อม -->
        <div id="series-select-wrapper" class="ts-dark-wrapper hidden">
            <select id="series-select" placeholder="ค้นหาหรือเลือกซีรีส์..." autocomplete="off">
                <option value="">ค้นหาหรือเลือกซีรีส์...</option>
            </select>
        </div>
    </div>

    <!-- Contents Section -->
    <div id="contents-container" class="hidden space-y-8 animate-fade-in">
        
        <!-- Images Section -->
        <div class="border border-white/10 rounded-2xl overflow-hidden bg-slate-900/30">
            <div class="bg-slate-800/60 px-5 py-4 border-b border-white/5 flex items-center gap-3">
                <div class="bg-emerald-500/20 p-1.5 rounded-lg"><i class="fa-solid fa-image text-emerald-400"></i></div>
                <h3 class="font-semibold text-white text-lg">ไฟล์รูปภาพปก</h3>
                <span id="img-count" class="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded-full ml-auto">0</span>
            </div>
            <div id="images-list" class="p-5 space-y-3">
                <!-- Dynamic -->
            </div>
        </div>

        <!-- EPs Section -->
        <div class="border border-white/10 rounded-2xl overflow-hidden bg-slate-900/30">
            <div class="bg-slate-800/60 px-5 py-4 border-b border-white/5 flex items-center gap-3">
                <div class="bg-purple-500/20 p-1.5 rounded-lg"><i class="fa-solid fa-video text-purple-400"></i></div>
                <h3 class="font-semibold text-white text-lg">โฟลเดอร์ตอน (Episodes)</h3>
                <span id="ep-count" class="bg-slate-700 text-slate-300 text-xs px-2 py-0.5 rounded-full ml-auto">0</span>
            </div>
            <div id="eps-list" class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                <!-- Dynamic -->
            </div>
        </div>

    </div>
    
    <!-- Loading State -->
    <div id="loading-state" class="hidden text-center py-16">
        <i class="fa-solid fa-circle-notch fa-spin text-blue-500 text-4xl mb-4"></i>
        <p class="text-slate-400 font-medium">กำลังดึงข้อมูลจาก R2...</p>
    </div>
    
    <!-- Empty State -->
    <div id="empty-state" class="hidden text-center py-16">
        <div class="bg-slate-800/50 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-4 border border-white/5">
            <i class="fa-solid fa-folder-open text-slate-500 text-4xl"></i>
        </div>
        <p class="text-white font-medium text-lg mb-1">ไม่พบข้อมูลไฟล์</p>
        <p class="text-slate-400">โฟลเดอร์นี้ว่างเปล่า หรือเพิ่งสร้างใหม่</p>
    </div>
</div>

<style>
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
.animate-fade-in {
    animation: fadeIn 0.4s ease-out forwards;
}

/* Tom Select Dark Theme Overrides */
.ts-control, .ts-placeholder {
    background: #0f172a !important; /* slate-900 */
    color: #f8fafc !important; /* slate-50 */
    border: 1px solid #334155 !important; /* slate-700 */
    border-radius: 0.75rem !important; /* rounded-xl */
    padding: 0.75rem 1rem !important;
    font-size: 16px !important;
    min-height: 48px;
}
.ts-placeholder {
    cursor: wait;
}
.ts-wrapper.focus .ts-control {
    border-color: #3b82f6 !important; /* blue-500 */
    box-shadow: 0 0 0 1px #3b82f6 !important;
}
.ts-dropdown {
    background: #0f172a !important;
    color: #f8fafc !important;
    border: 1px solid #334155 !important;
    border-radius: 0.75rem !important;
    margin-top: 0.5rem !important;
    overflow: hidden;
}
.ts-dropdown .active {
    background: #1e293b !important; /* slate-800 */
    color: #3b82f6 !important;
}
.ts-dropdown .option {
    padding: 0.75rem 1rem !important;
}
.ts-control input {
    color: #f8fafc !important;
    font-size: 16px !important;
}
</style>

<script>
    let currentDomain = '';
    let tsInstance = null;

    document.addEventListener('DOMContentLoaded', loadSeriesList);

    async function loadSeriesList() {
        const select = document.getElementById('series-select');
        const skeleton = document.getElementById('series-select-skeleton');
        const wrapper = document.getElementById('series-select-wrapper');

        try {
            const data = await fetchSeriesOptions();
            data.forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder;
                opt.textContent = folder;
                select.appendChild(opt);
            });
            
            // Initialize Tom Select
            tsInstance = new TomSelect(select, {
                create: false,
                sortField: null, // ใช้ลำดับตามที่ API ส่งมา (ล่าสุดอยู่บนสุด)
                onChange: loadContents,
                maxOptions: 500,
                render: {
                    no_results: (data, escape) => `<div class="no-results p-3 text-slate-500 text-sm">ไม่พบซีรีส์ "${escape(data.input)}"</div>`
                }
            });

            // สลับ UI จาก Skeleton เป็นของจริง
            skeleton.classList.add('hidden');
            wrapper.classList.remove('hidden');
            wrapper.classList.add('animate-fade-in');

        } catch (e) {
            console.error('Failed to load series');
            skeleton.innerHTML = '<span class="text-red-400 text-sm">โหลดข้อมูลล้มเหลว</span>';
        }
    }

    async function loadContents() {
        const series = tsInstance ? tsInstance.getValue() : '';
        const container = document.getElementById('contents-container');
        const loader = document.getElementById('loading-state');
        const empty = document.getElementById('empty-state');
        const deleteBtn = document.getElementById('delete-series-btn');
        
        container.classList.add('hidden');
        empty.classList.add('hidden');
        deleteBtn.classList.add('hidden');
        
        if (!series) return;
        
        loader.classList.remove('hidden');
        
        try {
            const res = await fetch(`/api/series/${encodeURIComponent(series)}`);
            const data = await res.json();
            currentDomain = data.domain.replace(/\/$/, ""); // Remove trailing slash
            
            loader.classList.add('hidden');
            
            if (data.contents.images.length === 0 && data.contents.eps.length === 0) {
                empty.classList.remove('hidden');
                deleteBtn.classList.remove('hidden');
                return;
            }
            
            document.getElementById('img-count').textContent = data.contents.images.length;
            document.getElementById('ep-count').textContent = data.contents.eps.length;
            
            renderImages(series, data.contents.images);
            renderEps(series, data.contents.eps);
            
            container.classList.remove('hidden');
            deleteBtn.classList.remove('hidden');
            
        } catch (e) {
            loader.classList.add('hidden');
            showToast('เกิดข้อผิดพลาดในการโหลดข้อมูล', true);
        }
    }

    function renderImages(series, images) {
        const list = document.getElementById('images-list');
        list.innerHTML = '';
        
        if (images.length === 0) {
            list.innerHTML = '<div class="text-center py-6 text-slate-500"><i class="fa-solid fa-image-slash mb-2 text-2xl"></i><p>ไม่มีไฟล์รูปภาพในซีรีส์นี้</p></div>';
            return;
        }
        
        images.forEach(img => {
            const url = `${currentDomain}/series/${encodePathPart(series)}/${encodePathPart(img)}`;
            const key = `series/${series}/${img}`;
            
            list.innerHTML += `
                <div class="flex items-center justify-between p-4 bg-slate-800/40 rounded-xl border border-white/5 hover:border-white/10 transition-colors group">
                    <div class="flex items-center gap-4 overflow-hidden">
                        <div class="w-12 h-12 bg-slate-900 rounded-lg flex items-center justify-center shrink-0 overflow-hidden relative">
                            <img src="${escapeAttr(url)}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity" onerror="this.outerHTML='<i class=\\'fa-solid fa-file-image text-slate-500 text-xl\\'></i>'">
                        </div>
                        <div class="min-w-0">
                            <p class="text-sm font-medium text-slate-200 truncate" title="${escapeAttr(img)}">${escapeHtml(img)}</p>
                            <a href="${escapeAttr(url)}" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 truncate block mt-0.5"><i class="fa-solid fa-arrow-up-right-from-square mr-1"></i>ดูรูปภาพ</a>
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0 ml-4">
                        <button onclick="copyToClipboard('${escapeAttr(escapeJs(url))}')" class="bg-slate-700 hover:bg-slate-600 text-white p-2.5 rounded-lg transition-colors" title="คัดลอก URL">
                            <i class="fa-solid fa-link"></i>
                        </button>
                        <button onclick="deleteItem('${escapeAttr(escapeJs(key))}')" class="bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 p-2.5 rounded-lg transition-colors" title="ลบไฟล์">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
        });
    }

    function renderEps(series, eps) {
        const list = document.getElementById('eps-list');
        list.innerHTML = '';
        
        if (eps.length === 0) {
            list.innerHTML = '<div class="col-span-full text-center py-6 text-slate-500"><i class="fa-solid fa-video-slash mb-2 text-2xl"></i><p>ไม่มีตอน (EP) ในซีรีส์นี้</p></div>';
            return;
        }
        
        eps.sort((a, b) => {
            const numA = parseInt(a.replace(/\D/g, '')) || 0;
            const numB = parseInt(b.replace(/\D/g, '')) || 0;
            return numA - numB;
        });

        eps.forEach(ep => {
            const url = `${currentDomain}/series/${encodePathPart(series)}/${encodePathPart(ep)}/playlist.m3u8`;
            
            list.innerHTML += `
                <div class="bg-slate-800/40 p-5 rounded-xl border border-white/5 hover:border-purple-500/30 transition-all flex flex-col gap-4 group relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-purple-500/5 rounded-bl-full -mr-2 -mt-2 group-hover:bg-purple-500/10 transition-colors"></div>
                    <div class="flex items-center gap-3 relative z-10">
                        <div class="bg-slate-900 p-2.5 rounded-lg text-purple-400">
                            <i class="fa-solid fa-folder-open"></i>
                        </div>
                        <span class="font-semibold text-white text-lg">${escapeHtml(ep)}</span>
                    </div>
                    <div class="flex gap-2 mt-auto relative z-10">
                        <button onclick="copyToClipboard('${escapeAttr(escapeJs(url))}')" class="flex-1 bg-slate-700 hover:bg-slate-600 text-white px-3 py-2 rounded-lg transition-colors text-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-link"></i> ลิงก์ .m3u8
                        </button>
                        <button onclick="deleteEp('${escapeAttr(escapeJs(series))}', '${escapeAttr(escapeJs(ep))}')" class="flex-none bg-red-500/10 hover:bg-red-500/20 text-red-400 border border-red-500/20 px-3 py-2 rounded-lg transition-colors text-sm flex items-center justify-center" title="ลบโฟลเดอร์นี้">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                </div>
            `;
        });
    }

    async function deleteItem(key) {
        if (!confirm('คุณแน่ใจหรือไม่ว่าต้องการลบไฟล์รูปภาพนี้?')) return;
        
        try {
            const res = await fetch('/api/delete/object', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key: key})
            });
            if (res.ok) {
                showToast('ลบไฟล์สำเร็จ');
                loadContents();
            } else {
                showToast('เกิดข้อผิดพลาดในการลบ', true);
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function deleteEp(series, ep) {
        if (!confirm(`คุณแน่ใจหรือไม่ว่าต้องการลบตอน ${ep}?\nข้อมูล .m3u8 และ .ts ทั้งหมดในโฟลเดอร์นี้จะถูกลบอย่างถาวร!`)) return;
        
        try {
            const res = await fetch('/api/delete/ep', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({series_name: series, ep_name: ep})
            });
            if (res.ok) {
                showToast(`ลบโฟลเดอร์ ${ep} สำเร็จ`);
                loadContents();
            } else {
                showToast('เกิดข้อผิดพลาดในการลบ', true);
            }
        } catch (e) {
            console.error(e);
        }
    }

    async function deleteSeries() {
        const series = tsInstance ? tsInstance.getValue() : '';
        if (!series) return;
        
        if (!confirm(`คำเตือนร้ายแรง!\nคุณต้องการลบซีรีส์ "${series}" ใช่หรือไม่?\nไฟล์รูปภาพและตอน (EP) ทั้งหมดที่อยู่ข้างในจะถูกลบและไม่สามารถกู้คืนได้!`)) return;
        
        try {
            const res = await fetch('/api/delete/series', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({series_name: series})
            });
            if (res.ok) {
                alert('ลบซีรีส์สำเร็จแล้ว');
                window.location.reload();
            } else {
                showToast('เกิดข้อผิดพลาดในการลบ', true);
            }
        } catch (e) {
            console.error(e);
        }
    }

    function encodePathPart(value) {
        return encodeURIComponent(value).replaceAll('%2F', '/');
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
        return escapeHtml(value).replaceAll('`', '&#096;');
    }

    function escapeJs(value) {
        return String(value ?? '')
            .replaceAll('\\', '\\\\')
            .replaceAll("'", "\\'")
            .replaceAll('\n', '\\n')
            .replaceAll('\r', '\\r');
    }
</script>
{% endblock %}
